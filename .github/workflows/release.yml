name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.LEADERBOARD_PAT }}

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install python-semantic-release
        # Pinned: the vendored .semrel changelog templates are validated against
        # this version. Bump deliberately and re-verify the templates render.
        run: uv tool install python-semantic-release==10.6.1

      - name: Bump version (no commit)
        run: semantic-release version --skip-build --no-commit --no-tag --no-changelog
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}

      - name: Sync uv.lock
        run: |
          uv lock --upgrade-package liars-dice
          git add uv.lock

      - name: Release
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}

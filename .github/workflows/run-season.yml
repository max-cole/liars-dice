name: Run Season

on:
  schedule:
    - cron: "0 9 * * *" # 9am UTC every day
  workflow_dispatch:
    inputs:
      force_tournament:
        description: "Force a quarterly tournament reset regardless of date"
        type: boolean
        default: false

concurrency:
  group: leaderboard-write
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide mode
        id: decide
        run: |
          if [ "${{ inputs.force_tournament }}" = "true" ]; then
            echo "mode=tournament" >> "$GITHUB_OUTPUT"
            echo "force_tournament=true → tournament mode"
            exit 0
          fi

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "mode=season" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DOW=$(date +%u)
          if [ "$DOW" != "1" ]; then
            # Non-Monday: only run if new players joined since the last successful run
            last_run=$(gh run list --workflow=run-season.yml --limit=10 \
              --json conclusion,createdAt \
              --jq '[.[] | select(.conclusion == "success")] | .[0].createdAt // empty' \
              2>/dev/null || echo "")
            if [ -n "$last_run" ]; then
              since="$last_run"
            else
              since="48 hours ago"
            fi
            if git log --since="$since" --name-only --pretty=format: -- 'players/*.py' | grep -q '\.py$'; then
              echo "mode=season" >> "$GITHUB_OUTPUT"
              echo "New player(s) since last run — running season."
            else
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "No new players since last run — skipping."
            fi
            exit 0
          fi

          # Mirrors game/season/utils.py::is_tournament_monday() as a pure date
          # check — no interpreter/dependency startup, no swallowed failures.
          # (Previously this exec'd the whole of reset_season.py just to read a
          # boolean, which actually ran the real tournament reset as a side
          # effect and silently fell back to "season" on any failure.)
          MONTH=$(date +%-m)
          DAY=$(date +%-d)
          case "$MONTH" in
            1|4|7|10)
              if [ "$DAY" -le 7 ]; then
                IS_TOURNAMENT=true
              else
                IS_TOURNAMENT=false
              fi
              ;;
            *)
              IS_TOURNAMENT=false
              ;;
          esac

          if [ "$IS_TOURNAMENT" = "true" ]; then
            echo "mode=tournament" >> "$GITHUB_OUTPUT"
            echo "Tournament Monday detected."
          else
            echo "mode=season" >> "$GITHUB_OUTPUT"
            echo "Regular Monday season run."
          fi

  run:
    needs: guard
    if: needs.guard.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONPATH: .
      N_GAMES: ${{ vars.N_GAMES || '1000' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.LEADERBOARD_PAT }}

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Run tournament reset
        if: needs.guard.outputs.mode == 'tournament'
        run: uv run python .github/scripts/reset_season.py

      - name: Run regular season
        if: needs.guard.outputs.mode == 'season'
        run: uv run python .github/scripts/run_season.py

      - name: Commit leaderboard update
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # players/ is included so an expelled offender's deleted source file
          # (see _expel_player in run_season.py) actually gets committed —
          # otherwise it reappears as an "unregistered challenger" on every
          # subsequent PRM/CH run once it drops out of leaderboard.yaml.
          git add leaderboard.yaml README.md players/
          if ! git diff --cached --quiet; then
            git commit -m "ci: update leaderboard [skip ci]"
            if [ -z "${DRY_RUN:-}" ]; then
              git pull --rebase
              git push
            else
              echo "[dry-run] skipping git push"
            fi
          fi

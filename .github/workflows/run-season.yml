name: Run Season

on:
  schedule:
    - cron: "0 9 * * *" # 9am UTC = 5am EDT; guard job decides whether to actually run
  workflow_dispatch: # allow manual trigger for testing

permissions:
  contents: write
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to run season
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — always run."
            exit 0
          fi

          DOW=$(date +%u)  # 1=Monday … 7=Sunday

          if git log --since="24 hours ago" --name-only --pretty=format: -- 'players/*.py' | grep -q '\.py$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Player file(s) added or modified in last 24h — running season."
          elif [ "$DOW" = "1" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Weekly Monday run."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: not Monday and no new players in last 24h."
          fi

  run-season:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONPATH: .
      N_GAMES: ${{ vars.N_GAMES || '1000' }}
      TOP_N: ${{ vars.TOP_N || '4' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LEADERBOARD_PAT }}

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Run season script
        run: uv run python .github/scripts/run_season.py

      - name: Commit leaderboard update
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add leaderboard.yaml README.md
          if ! git diff --cached --quiet; then
            git commit -m "ci: update leaderboard [skip ci]"
            git pull --rebase
            git push
          fi

      - name: Post summary to GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ vars.SEASON_TRACKING_ISSUE || '1' }} --body-file season_summary.md
